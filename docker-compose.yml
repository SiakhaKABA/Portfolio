services:
  mongodb:
    image: mongo:7
    container_name: portfolio-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - portfolio-net

  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/portfolio
      - JWT_SECRET=${JWT_SECRET:-sk_portfolio_secret_key_2026_change_me}
      - CLIENT_URL=http://localhost
      - PORT=3001
    depends_on:
      - mongodb
    networks:
      - portfolio-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - portfolio-net

volumes:
  mongo-data:

networks:
  portfolio-net:
    driver: bridge
